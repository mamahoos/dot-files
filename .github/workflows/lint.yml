name: Lint

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: .

      - name: shfmt check
        uses: luizm/action-shfmt@v1
        with:
          shfmt-flags: "-d -i 2"
